<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>FireHire Academy</title>

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="icon"
        href="https://i.ibb.co/jvdf6zvT/Logo.png?v=2">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#0f172a;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      display:block;
      pointer-events:auto;
      touch-action:auto;
      -webkit-overflow-scrolling:touch;
    }
  </style>

  <script>
    // حل مشاكل Chrome Android مع Google Apps Script
    function openApp() {
      window.location.replace(
        "https://script.google.com/macros/s/AKfycbzFcA0NBvcIJjWoKlI0SUXouvu3_YYXQVx04forveeb_G483EKP1WQaV_RxCjzfP9gFjQ/exec"
      );
    }

    // لو المتصفح Chrome على الموبايل افتحه Redirect مباشر
    const isChromeMobile =
      /Android/i.test(navigator.userAgent) &&
      /Chrome/i.test(navigator.userAgent);

    if (isChromeMobile) {
      openApp();
    }
  </script>
</head>

<body>

  <iframe
    src="https://script.google.com/macros/s/AKfycbzFcA0NBvcIJjWoKlI0SUXouvu3_YYXQVx04forveeb_G483EKP1WQaV_RxCjzfP9gFjQ/exec"
    allow="fullscreen">
  </iframe>

</body>

</html>
